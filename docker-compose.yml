services:
  postgres:
    image: postgres:17-alpine
    container_name: akademiso-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-akademiso}"
      POSTGRES_USER: "${POSTGRES_USER:-akademiso}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-akademiso}"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-akademiso} -d ${POSTGRES_DB:-akademiso}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: akademiso-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      DJANGO_DEBUG: "0"
      DJANGO_SECRET_KEY: "${DJANGO_SECRET_KEY:-ganti-dengan-secret-key-production}"
      DJANGO_ALLOWED_HOSTS: "${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,backend,72.61.208.187}"
      DJANGO_CORS_ALLOW_ALL_ORIGINS: "${DJANGO_CORS_ALLOW_ALL_ORIGINS:-0}"
      DJANGO_CORS_ALLOWED_ORIGINS: "${DJANGO_CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000,http://72.61.208.187,http://72.61.208.187:3000}"
      DJANGO_CSRF_TRUSTED_ORIGINS: "${DJANGO_CSRF_TRUSTED_ORIGINS:-http://localhost:3000,http://localhost:8000,http://127.0.0.1:3000,http://127.0.0.1:8000,http://72.61.208.187,http://72.61.208.187:3000,http://72.61.208.187:8000}"
      DJANGO_SERVE_MEDIA: "1"
      DJANGO_SECURE_SSL_REDIRECT: "${DJANGO_SECURE_SSL_REDIRECT:-0}"
      DJANGO_SESSION_COOKIE_SECURE: "${DJANGO_SESSION_COOKIE_SECURE:-0}"
      DJANGO_CSRF_COOKIE_SECURE: "${DJANGO_CSRF_COOKIE_SECURE:-0}"
      DJANGO_SECURE_HSTS_SECONDS: "${DJANGO_SECURE_HSTS_SECONDS:-0}"
      DJANGO_SECURE_HSTS_INCLUDE_SUBDOMAINS: "${DJANGO_SECURE_HSTS_INCLUDE_SUBDOMAINS:-0}"
      DJANGO_SECURE_HSTS_PRELOAD: "${DJANGO_SECURE_HSTS_PRELOAD:-0}"
      DJANGO_DB_ENGINE: "${DJANGO_DB_ENGINE:-postgresql}"
      POSTGRES_HOST: "postgres"
      POSTGRES_PORT: "5432"
      POSTGRES_DB: "${POSTGRES_DB:-akademiso}"
      POSTGRES_USER: "${POSTGRES_USER:-akademiso}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-akademiso}"
      DJANGO_DB_PATH: "${DJANGO_DB_PATH:-/app/data/db.sqlite3}"
      DJANGO_CREATE_SUPERUSER: "${DJANGO_CREATE_SUPERUSER:-0}"
      DJANGO_SUPERUSER_USERNAME: "${DJANGO_SUPERUSER_USERNAME:-admin}"
      DJANGO_SUPERUSER_EMAIL: "${DJANGO_SUPERUSER_EMAIL:-admin@example.com}"
      DJANGO_SUPERUSER_PASSWORD: "${DJANGO_SUPERUSER_PASSWORD:-admin12345}"
      DJANGO_SUPERUSER_FIRST_NAME: "${DJANGO_SUPERUSER_FIRST_NAME:-Admin}"
      DJANGO_SUPERUSER_LAST_NAME: "${DJANGO_SUPERUSER_LAST_NAME:-Akademiso}"
      DJANGO_LOAD_DEMO_DATA: "${DJANGO_LOAD_DEMO_DATA:-0}"
      GOOGLE_OAUTH_CLIENT_ID: "${GOOGLE_OAUTH_CLIENT_ID:-}"
      GOOGLE_OAUTH_CLIENT_IDS: "${GOOGLE_OAUTH_CLIENT_IDS:-}"
      GUNICORN_WORKERS: "${GUNICORN_WORKERS:-3}"
      GUNICORN_TIMEOUT: "${GUNICORN_TIMEOUT:-120}"
    volumes:
      - backend_data:/app/data
      - backend_media:/app/media
      - backend_static:/app/staticfiles

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:-http://localhost:8000}"
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: "${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}"
        BACKEND_INTERNAL_URL: "http://backend:8000"
    container_name: akademiso-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: "production"
      NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:-http://localhost:8000}"
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: "${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}"
      BACKEND_INTERNAL_URL: "http://backend:8000"

volumes:
  postgres_data:
  backend_data:
  backend_media:
  backend_static:
